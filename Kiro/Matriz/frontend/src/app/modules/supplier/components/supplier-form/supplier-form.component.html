<div class="supplier-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Editar Proveedor' : 'Nuevo Proveedor' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="supplierForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" placeholder="Ingrese el nombre del proveedor" required>
          <mat-error *ngIf="supplierForm.get('name')?.hasError('required')">
            El nombre es requerido
          </mat-error>
          <mat-error *ngIf="supplierForm.get('name')?.hasError('maxlength')">
            El nombre no puede exceder 100 caracteres
          </mat-error>
        </mat-form-field>

        <div class="checkbox-field">
          <mat-checkbox formControlName="compliance">
            En Cumplimiento
          </mat-checkbox>
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancelar</button>
          <button 
            mat-raised-button 
            color="primary" 
            type="submit" 
            [disabled]="supplierForm.invalid || (isLoading$ | async)">
            <mat-spinner *ngIf="isLoading$ | async" diameter="20"></mat-spinner>
            <span *ngIf="!(isLoading$ | async)">{{ isEditMode ? 'Actualizar' : 'Crear' }}</span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
